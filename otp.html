<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap');

:root {
    --primary-red: #e03f3e;
    --bg: #f5f7fa;
    --text-dark: #1f2937;
    --text-light: #6b7280;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.otp-box {
    background: #fff;
    padding: 40px 30px;
    border-radius: 12px;
    width: 350px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* TITLE */
.otp-box h2 {
    font-family: 'Poppins', sans-serif;
    margin-bottom: 10px;
    color: var(--text-dark);
}

.otp-box p {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 25px;
}

/* INPUT */
.otp-input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border: 2px solid #ddd;
    border-radius: 8px;
    outline: none;
    margin-bottom: 20px;
    transition: 0.3s;
    text-align: center;
    letter-spacing: 4px;
}

.otp-input:focus {
    border-color: var(--primary-red);
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    background: var(--primary-red);
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    opacity: 0.9;
}

.btn:disabled {
    background: #aaa;
    cursor: not-allowed;
}

/* SMALL TEXT */
.small {
    margin-top: 15px;
    font-size: 12px;
    color: var(--text-light);
}
</style>

</head>

<body>

<div class="otp-box">

    <h2>OTP Verification</h2>
    <p>Enter the OTP sent to your mobile number</p>

    <input type="text" id="otpInput" class="otp-input" placeholder="Enter OTP" maxlength="6">

    <button id="verifyBtn" class="btn" onclick="verifyOtp()">
        Verify OTP
    </button>

    <div class="small">
        Didn't receive OTP? Try again from <a href="bloodrequest.html">Blood Request page</a>
    </div>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Your JS -->
<script src="otp.js"></script>

</body>
</html>
